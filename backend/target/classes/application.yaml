spring:
  application:
    name: amanguard-backend

  datasource:
    url: jdbc:h2:mem:amanguard
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# Fraud-prevention thresholds. max-purchase-amount is the hard purchase limit:
# any transaction above it is blocked and the account frozen automatically,
# with no customer input. Never exposed as a customer-facing form field —
# read-only visibility for bank officers via GET /api/config/thresholds.
amanguard:
  fraud:
    max-purchase-amount: 5000
    currency: SAR