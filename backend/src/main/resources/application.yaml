spring:
  application:
    name: amanguard-backend

  datasource:
    url: jdbc:mysql://127.0.0.1:3307/amanguard_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: amanguard_user
    password: AmanGuard@12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

amanguard:
  fraud:
    max-purchase-amount: 5000
    currency: SAR

  auth:
    issuer: AmanGuard
    jwt-secret: ${AMANGUARD_JWT_SECRET:demo-secret-change-this-before-production-please-use-64-characters-minimum}
    access-token-minutes: 30
    refresh-token-days: 7
    otp-expiry-minutes: 5
    expose-demo-otp: true