spring:
  application:
    name: amanguard-backend

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/amanguard_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: amanguard_user
    password: AmanGuard@12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

amanguard:
  fraud:
    max-purchase-amount: 5000
    currency: SAR

  ai:
    # Python fraud-analysis engine (AI/phishingGPT.py). Resolved from OS env
    # vars, not the root .env (that file belongs to Vite + the Python engine).
    engine-url: ${AI_ENGINE_URL:http://localhost:8000}
    # Optional backend->engine bearer token. The current engine is keyless, so
    # this defaults empty and no Authorization header is sent unless it is set.
    api-key: ${AI_API_KEY:}
    timeout-ms: 8000
    # When true, /api/analyze uses the AI engine and falls back to rule-based
    # scoring if it is unreachable/errors. When false, rules are used directly.
    fallback-enabled: true

  auth:
    issuer: AmanGuard
    jwt-secret: ${AMANGUARD_JWT_SECRET:demo-secret-change-this-before-production-please-use-64-characters-minimum}
    access-token-minutes: 30
    refresh-token-days: 7
    otp-expiry-minutes: 5
    expose-demo-otp: true