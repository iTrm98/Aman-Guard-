<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d1b2a;
      color: #e0eaf5;
    }
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #1e2f42;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo { font-size: 20px; font-weight: 900; }
    .logo span { color: #9784e2; }
    .subtitle { font-size: 10px; color: #4a6070; margin-top: 2px; }
    .status-section { padding: 16px 20px; border-bottom: 1px solid #1e2f42; }
    .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .status-label { font-size: 12px; color: #8090a0; }
    .status-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-green { background: #22c55e; }
    .dot-red { background: #ef4444; }
    .dot-gray { background: #9ca3af; }
    .user-section { padding: 12px 20px; border-bottom: 1px solid #1e2f42; }
    .user-row { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,#9784e2,#605C94); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .user-name { font-size: 13px; font-weight: 700; }
    .user-role { font-size: 10px; color: #4a6070; }
    .last-scan { padding: 14px 20px; border-bottom: 1px solid #1e2f42; }
    .scan-title { font-size: 11px; color: #4a6070; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .scan-result { display: flex; align-items: center; gap: 8px; }
    .scan-icon { font-size: 20px; }
    .scan-site { font-size: 12px; color: #8090a0; margin-top: 2px; }
    .scan-level { font-size: 13px; font-weight: 700; }
    .level-critical { color: #ef4444; }
    .level-high { color: #f97316; }
    .level-low { color: #22c55e; }
    .actions { padding: 14px 20px; display: flex; flex-direction: column; gap: 8px; }
    .btn { padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; font-family: inherit; transition: all 0.15s; }
    .btn-primary { background: #9784e2; color: white; }
    .btn-primary:hover { background: #605C94; }
    .btn-ghost { background: transparent; color: #8090a0; border: 1px solid #1e2f42; }
    .btn-ghost:hover { background: #1e2f42; color: #e0eaf5; }
    .footer { padding: 10px 20px; text-align: center; font-size: 10px; color: #304050; }
    .no-scan { color: #4a6070; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="logo">Aman<span>Guard</span></div>
      <div class="subtitle">Financial Fraud Intelligence</div>
    </div>
  </div>

  <div class="status-section">
    <div class="status-row">
      <span class="status-label">حالة الاتصال | Connection</span>
      <div class="status-badge" id="connection-status">
        <span class="dot dot-gray" id="conn-dot"></span>
        <span id="conn-text">جارٍ التحقق...</span>
      </div>
    </div>
    <div class="status-row">
      <span class="status-label">الحماية | Protection</span>
      <div class="status-badge" style="color:#22c55e;">
        <span class="dot dot-green"></span>
        <span>فعّالة | Active</span>
      </div>
    </div>
  </div>

  <div class="user-section" id="user-section" style="display:none;">
    <div class="user-row">
      <div class="avatar" id="user-avatar">؟</div>
      <div>
        <div class="user-name" id="user-name">—</div>
        <div class="user-role" id="user-role">—</div>
      </div>
    </div>
  </div>

  <div class="last-scan" id="last-scan-section">
    <div class="scan-title">آخر فحص | Last Scan</div>
    <div id="last-scan-content">
      <p class="no-scan">لم يتم فحص أي موقع بعد | No sites scanned yet</p>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="open-portal">
      🛡️ فتح بوابة AmanGuard | Open Portal
    </button>
    <button class="btn btn-ghost" id="open-soc" style="display:none;">
      📊 لوحة الأمن | SOC Dashboard
    </button>
  </div>

  <div class="footer">AmanGuard v1.0 • Amad Hackathon 2026</div>

  <script src="popup.js"></script>
</body>
</html>
