<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 300px; font-family: 'Tajawal', 'Segoe UI', Arial, sans-serif; background: #0d1b2a; color: #e0eaf5; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #9784e255; border-radius: 99px; }
  </style>
</head>
<body>

  <!-- Header — identical to the sidebar logo area -->
  <div style="padding:16px 20px; border-bottom:1px solid #1e2f42; display:flex; align-items:center; gap:10px;">
    <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#9784e2,#605C94);display:flex;align-items:center;justify-content:center;font-size:18px;">🛡️</div>
    <div>
      <div style="color:#fff;font-weight:900;font-size:17px;">Aman<span style="color:#9784e2;">Guard</span></div>
      <div style="color:#304050;font-size:10px;">Financial Fraud Intelligence</div>
    </div>
  </div>

  <!-- Connection row -->
  <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 20px;">
    <span style="font-size:12px;color:#8090a0;">الاتصال | Connection</span>
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;" id="conn-badge">
      <span style="width:8px;height:8px;border-radius:50%;background:#9ca3af;" id="conn-dot"></span>
      <span id="conn-text" style="color:#8090a0;">جارٍ التحقق...</span>
    </div>
  </div>

  <!-- Protection row -->
  <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-bottom:1px solid #1e2f42;">
    <span style="font-size:12px;color:#8090a0;">الحماية | Protection</span>
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:#22c55e;" id="protection-badge">
      <span style="width:8px;height:8px;border-radius:50%;background:#22c55e;" id="protection-dot"></span>
      <span id="protection-text">فعّالة | Active</span>
    </div>
  </div>

  <!-- User section — identical to the sidebar user chip -->
  <div id="user-section" style="display:none;padding:12px 20px;border-bottom:1px solid #1e2f42;">
    <div style="display:flex;align-items:center;gap:10px;background:#0a1620;padding:10px 12px;border-radius:12px;">
      <div id="user-avatar" style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#9784e2,#605C94);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;">؟</div>
      <div>
        <div id="user-name" style="font-size:13px;font-weight:700;color:#c8d8e8;">—</div>
        <div id="user-role" style="font-size:11px;color:#4a6070;">—</div>
      </div>
    </div>
  </div>

  <!-- Last scan -->
  <div style="padding:14px 20px;border-bottom:1px solid #1e2f42;">
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#304050;margin-bottom:10px;">آخر فحص | Last Scan</div>
    <div id="last-scan-content">
      <p style="color:#4a6070;font-size:12px;">لم يتم فحص أي موقع بعد | No sites scanned yet</p>
    </div>
  </div>

  <!-- Action buttons -->
  <div style="padding:14px 20px;display:flex;flex-direction:column;gap:8px;">
    <button id="open-portal" style="background:#9784e2;color:#fff;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.15s;width:100%;">
      🛡️ فتح بوابة AmanGuard | Open Portal
    </button>
    <button id="open-soc" style="display:none;background:transparent;color:#5a6a7a;border:1.5px solid #1e2f42;border-radius:10px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;">
      📊 لوحة الأمن | SOC Dashboard
    </button>
  </div>

  <!-- Footer -->
  <div style="padding:10px 20px;text-align:center;font-size:10px;color:#304050;border-top:1px solid #1e2f42;">
    AmanGuard v1.0 • Amad Hackathon 2026
  </div>

  <script src="popup.js"></script>
</body>
</html>
