# AmanGuard frontend nginx — serves the built SPA and proxies the API +
# WebSocket to the backend container, so the bundle's relative "/api" base
# URL is same-origin (no CORS) and works from any host that reaches port 80.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Same-origin API → backend container. Forward the real client IP so the
    # audit log / rate limiter don't only ever see the nginx container.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend WebSocket endpoint (INT-002 groundwork; frontend not wired yet).
    location /ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Extension ZIP — emitted at the dist root by the Vite build (no file
    # extension, so give it an explicit type).
    location = /extension-download {
        default_type application/zip;
    }

    # Long-cache the hashed Vite assets; index.html stays revalidated.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # try_files keeps deep links working even though the app currently routes
    # purely in state (no URL routes).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
