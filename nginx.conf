# Serves the built AmanGuard SPA. try_files keeps deep links working even
# though the app currently routes purely in state (no URL routes).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the hashed Vite assets; index.html stays revalidated.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
